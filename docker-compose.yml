version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: colis-db
    environment:
      POSTGRES_USER: colis
      POSTGRES_PASSWORD: colis
      POSTGRES_DB: colis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colis"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colis-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://colis:colis@db:5432/colis_db
      DEBUG: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
